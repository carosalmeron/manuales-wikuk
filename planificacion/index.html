<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planificación de Compras · Guía</title>
<style>
  :root{
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Monaco,'Courier New',monospace;
    --tinta:#15181d;
    --papel:#eef1f4;
    --papel2:#dfe4ea;
    --azul:#1f5fa8;
    --azul2:#2b7fd4;
    --rojo:#c62f2f;
    --ambar:#c2660c;
    --verde:#2f7d52;
    --linea:#c9d2dc;
    --humo:#5f6a76;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100dvh;overflow:hidden}
  body{font-family:var(--sans);background:var(--tinta);color:var(--tinta);display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}

  .stage{position:relative;width:100%;max-width:480px;height:100dvh;background:var(--papel);overflow:hidden;display:flex;flex-direction:column}
  .stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(var(--linea) 0.5px,transparent 0.5px);background-size:15px 15px;opacity:.4}

  .top{position:relative;z-index:3;padding:16px 22px 11px;border-bottom:1.5px solid var(--tinta);display:flex;align-items:center;justify-content:space-between;background:var(--papel)}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .k{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--azul);text-transform:uppercase;margin-bottom:5px}
  .brand .t{font-weight:900;font-size:16px;letter-spacing:-.01em;text-transform:uppercase}
  .count{font-family:var(--mono);font-size:10px;color:var(--humo);text-align:right;line-height:1.3}
  .count b{color:var(--tinta);font-size:13px}

  .track{position:relative;z-index:3;display:flex;gap:2px;padding:0 22px}
  .track .seg{flex:1;height:3px;background:var(--linea);border-radius:2px;overflow:hidden;margin:10px 0}
  .track .seg i{display:block;height:100%;width:0;background:var(--azul);border-radius:2px;transition:width .35s ease}
  .track .seg.done i,.track .seg.active i{width:100%}

  .card-wrap{position:relative;z-index:2;flex:1;overflow:hidden}
  .card{position:absolute;inset:0;padding:8px 22px 20px;display:flex;flex-direction:column;opacity:0;transform:translateX(38px);transition:opacity .42s ease,transform .42s ease;pointer-events:none;overflow-y:auto}
  .card.in{opacity:1;transform:translateX(0);pointer-events:auto}
  .card.out-left{opacity:0;transform:translateX(-38px)}

  .eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:2px;border:1.2px solid var(--tinta)}
  .chip.azul{background:var(--azul);color:#fff;border-color:var(--azul)}
  .chip.ghost{color:var(--humo)}
  .num{font-family:var(--mono);font-size:10.5px;color:var(--azul);letter-spacing:.08em;margin-bottom:6px}
  h1{font-weight:900;font-size:26px;line-height:1.04;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:13px}
  .lead{font-size:14.5px;line-height:1.5;color:#333a42;margin-bottom:15px}
  .lead b{color:var(--azul)}

  .panel{background:#fff;border:1.5px solid var(--tinta);border-radius:6px;padding:13px 14px;margin-bottom:11px;position:relative;box-shadow:3px 3px 0 rgba(21,24,29,.08)}
  .panel .ph{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--humo);margin-bottom:9px}
  .row{display:flex;align-items:flex-start;gap:9px;font-size:13px;padding:5px 0;line-height:1.4}
  .row+.row{border-top:1px dashed var(--linea)}
  .ic{flex:none;width:22px;height:22px;border-radius:5px;display:grid;place-items:center;font-size:12px;font-weight:700;color:#fff;margin-top:1px}
  .ic.a{background:var(--azul)} .ic.r{background:var(--rojo)} .ic.m{background:var(--ambar)} .ic.v{background:var(--verde)} .ic.n{background:var(--tinta)}

  .flow{display:flex;flex-direction:column;margin-bottom:11px}
  .fstep{display:flex;gap:12px;align-items:flex-start;position:relative}
  .fstep .fk{flex:none;width:30px;height:30px;border-radius:50%;background:var(--tinta);color:var(--papel);font-weight:900;font-size:14px;display:grid;place-items:center;z-index:2}
  .fstep .fbody{padding-bottom:15px;padding-top:3px}
  .fstep .ft{font-weight:700;font-size:14px;line-height:1.2}
  .fstep .fx{font-size:12.5px;color:var(--humo);line-height:1.35;margin-top:2px}
  .fstep:not(:last-child)::before{content:"";position:absolute;left:14.5px;top:30px;bottom:0;width:1.5px;background:repeating-linear-gradient(var(--azul) 0 4px,transparent 4px 8px);z-index:1}
  .fstep:last-child .fk{background:var(--azul)}

  .shot{background:#fff;border:1.5px solid var(--tinta);border-radius:8px;overflow:hidden;margin-bottom:11px;box-shadow:3px 3px 0 rgba(21,24,29,.08)}
  .shot .cap{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--humo);padding:8px 10px 0}

  .kpi{display:flex;gap:7px;margin-bottom:11px}
  .kbox{flex:1;border-radius:7px;padding:11px 8px;text-align:center;border:1.5px solid}
  .kbox .kn{font-weight:900;font-size:21px;line-height:1}
  .kbox .kl{font-size:8.5px;font-weight:700;text-transform:uppercase;margin-top:4px;letter-spacing:.02em}
  .kbox.r{background:#fdeaea;border-color:#f2b8b8;color:var(--rojo)}
  .kbox.m{background:#fdf3e3;border-color:#f2d9a8;color:var(--ambar)}
  .kbox.a{background:#e8f1fb;border-color:#b8d3f0;color:var(--azul)}

  .nav{position:relative;z-index:4;padding:13px 22px calc(14px + env(safe-area-inset-bottom));border-top:1.5px solid var(--tinta);background:var(--papel);display:flex;align-items:center;gap:11px}
  .btn{font-family:var(--sans);font-weight:600;font-size:15px;border:1.5px solid var(--tinta);border-radius:7px;padding:13px 16px;background:var(--papel);cursor:pointer;transition:transform .12s ease}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:52px;display:grid;place-items:center;font-size:19px}
  .btn.next{flex:1;background:var(--azul);color:#fff;border-color:var(--azul);display:flex;align-items:center;justify-content:center;gap:8px}
  .btn.next .mono{font-family:var(--mono);font-size:11px;opacity:.8}
  .btn:disabled{opacity:.3}

  .cover{padding:0 24px;justify-content:center}
  .cover .big{font-weight:900;font-size:38px;line-height:.98;text-transform:uppercase;letter-spacing:-.03em;margin-bottom:16px}
  .cover .big em{font-style:normal;color:var(--azul);display:block}
  .cover .sub{font-size:14.5px;line-height:1.55;color:#333a42;margin-bottom:22px}
  .cover .meta{display:flex;gap:8px;flex-wrap:wrap}

  .end .big{font-weight:900;font-size:30px;line-height:1;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:14px}

  @media (max-height:680px){
    .cover .big{font-size:32px} h1{font-size:23px} .lead{font-size:13.5px}
    .nav{padding-top:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="top">
    <div class="brand">
      <span class="k">Grupo Consolidado · CRM</span>
      <span class="t">Planificación de Compras</span>
    </div>
    <div class="count"><span id="cpos"><b>00</b></span><br>de <span id="ctot">00</span></div>
  </div>
  <div class="track" id="track"></div>
  <div class="card-wrap" id="wrap"></div>
  <div class="nav">
    <button class="btn prev" id="prev">←</button>
    <button class="btn next" id="next"><span id="nextlbl">Empezar</span> <span class="mono" id="nextn"></span></button>
  </div>
</div>

     {ic:'n',t:'Total por artículo',x:'sumando todos los clientes'},
     {ic:'r',t:'Barra roja',x:'tiene unidades urgentes'},
     {ic:'a',t:'Cuántos clientes',x:'y qué calibres piden'},
   ]},
  {block:'VISTA COMPRAS',n:'09 / 10',title:'Timeline y por cliente',
   lead:'<b>Timeline</b>: cuánto cae cada una de las próximas 8 semanas. <b>Por cliente</b>: cuánto va a comprar cada uno en total.',
   shot:svgTimeline(),cap:'Vista 📅 Timeline — 8 semanas',
   rows:[
     {ic:'a',t:'Timeline',x:'volumen semana a semana para organizar fábrica'},
     {ic:'n',t:'Por cliente',x:'total planificado de cada cliente'},
   ]},
  {block:'VISTA COMPRAS',n:'10 / 10',title:'Quién puede verlo',
   lead:'La vista de Compras la abre el <b>responsable de compras/stock</b>, pero dirección y CEO también la ven. Cada comercial ve reflejadas sus propias planificaciones.',
   shot:svgCliente(),cap:'Vista 👥 Por cliente',
   rows:[
     {ic:'v',t:'Compras / Stock',x:'la usa para pedir a fábrica a tiempo'},
     {ic:'a',t:'Dirección y CEO',x:'ven el total del negocio'},
     {ic:'n',t:'Comercial',x:'ve lo que él ha planificado'},
   ]},
  {type:'end'}
];

const wrap=document.getElementById('wrap');
const track=document.getElementById('track');
const steps=SLIDES.length;
let i=0;

SLIDES.forEach(()=>{const s=document.createElement('div');s.className='seg';s.innerHTML='<i></i>';track.appendChild(s);});
document.getElementById('ctot').textContent=String(steps).padStart(2,'0');

function cardHTML(s){
  if(s.type==='cover'){
    return `<div class="card cover">
      <div class="meta" style="margin-bottom:16px"><span class="chip azul">Guía de uso</span><span class="chip ghost">v3.72</span></div>
      <div class="big">Planificación<em>de compras</em></div>
      <div class="sub">Cómo se registra una planificación desde la visita y cómo la ve Compras: por producto, por semana y por cliente. Nueve pasos.</div>
      <div class="meta"><span class="chip ghost">Comercial</span><span class="chip ghost">Compras</span><span class="chip ghost">Dirección</span></div>
    </div>`;
  }
  if(s.type==='end'){
    return `<div class="card end">
      <div class="eyebrow"><span class="chip azul">Resumen</span></div>
      <div class="big">En una frase</div>
      <div class="lead">El comercial anticipa <b>qué y cuándo</b> comprará el cliente desde la visita; Compras lo ve <b>todo junto</b> (por producto, semana y cliente) y pide a fábrica a tiempo.</div>
      <div class="panel"><div class="ph">Recuerda</div>
        <div class="row"><span class="ic r">!</span><div>La <b>fecha de servicio</b> es lo que marca la urgencia. Sin fecha correcta, no aparece bien en Compras.</div></div>
        <div class="row"><span class="ic a">📖</span><div>Elige el producto <b>del catálogo</b> para que el nombre sea el mismo que ve Compras.</div></div>
        <div class="row"><span class="ic v">🔄</span><div>Usa <b>Mensual</b> para los clientes que repiten pedido.</div></div>
      </div>
    </div>`;
  }
  let inner=`<div class="eyebrow"><span class="chip azul">${s.block}</span><span class="chip ghost">${s.ver||'CRM'}</span></div>
    <div class="num">PASO ${s.n}</div><h1>${s.title}</h1><div class="lead">${s.lead}</div>`;
  if(s.thr){
    inner+=`<div class="shot"><div class="cap">Regla del mínimo para planificar</div>${svgUmbral()}</div>`;
  }
  if(s.kpi){
    inner+=`<div class="kpi">`+s.kpi.map(k=>`<div class="kbox ${k.c}"><div class="kn">${k.n}</div><div class="kl">${k.l}</div></div>`).join('')+`</div>`;
  }
  if(s.shot){
    inner+=`<div class="shot">${s.cap?`<div class="cap">${s.cap}</div>`:''}${s.shot}</div>`;
  }
  if(s.flow){
    inner+=`<div class="flow">`+s.flow.map(f=>`<div class="fstep"><span class="fk">${f.k}</span><div class="fbody"><div class="ft">${f.t}</div><div class="fx">${f.x}</div></div></div>`).join('')+`</div>`;
  }
  if(s.rows){
    inner+=`<div class="panel"><div class="ph">Cómo funciona</div>`+s.rows.map(r=>`<div class="row"><span class="ic ${r.ic}">${r.ic==='v'?'✓':r.ic==='r'?'!':r.ic==='m'?'~':r.ic==='a'?'●':'•'}</span><div><b>${r.t}</b> — ${r.x}</div></div>`).join('')+`</div>`;
  }
  return `<div class="card">${inner}</div>`;
}

function render(){
  wrap.innerHTML=cardHTML(SLIDES[i]);
  const card=wrap.querySelector('.card');
  requestAnimationFrame(()=>card.classList.add('in'));
  [...track.children].forEach((seg,idx)=>{seg.classList.toggle('done',idx<i);seg.classList.toggle('active',idx===i);});
  document.getElementById('cpos').innerHTML='<b>'+String(i+1).padStart(2,'0')+'</b>';
  document.getElementById('prev').disabled=(i===0);
  const lbl=document.getElementById('nextlbl'),nn=document.getElementById('nextn');
  if(i===0){lbl.textContent='Empezar la guía';nn.textContent='';}
  else if(i===steps-1){lbl.textContent='Volver al inicio';nn.textContent='↺';}
  else{lbl.textContent='Siguiente';nn.textContent=String(i+1).padStart(2,'0')+'→'+String(i+2).padStart(2,'0');}
}
function go(dir){
  const card=wrap.querySelector('.card');
  if(dir>0&&i<steps-1){if(card){card.classList.remove('in');card.classList.add('out-left');}i++;setTimeout(render,170);}
  else if(dir>0&&i===steps-1){i=0;setTimeout(render,10);}
  else if(dir<0&&i>0){i--;setTimeout(render,10);}
}
document.getElementById('next').addEventListener('click',()=>go(1));
document.getElementById('prev').addEventListener('click',()=>go(-1));
let x0=null;
wrap.addEventListener('touchstart',e=>{x0=e.touches[0].clientX},{passive:true});
wrap.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>50)go(dx<0?1:-1);x0=null;});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
render();
</script>
</body>
</html>
